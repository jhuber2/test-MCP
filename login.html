<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Test Site - Login</title>
  <link rel="stylesheet" href="styles.css">
  <script src="app.js" defer></script>
</head>
<body>
  <header>
    <h1>Login</h1>
    <nav aria-label="Main navigation">
      <a id="nav-home" href="index.html">Home</a><a id="nav-login" href="login.html">Login</a><a id="nav-form" href="form.html">Form</a>
    </nav>
  </header>
  <main>
    <form id="login-form" class="card" novalidate>
      <div class="form-group">
        <label for="login-email">Email address</label>
        <input id="login-email" name="email" type="email" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input id="login-password" name="password" type="password" autocomplete="current-password" required minlength="6">
      </div>
      <div class="form-group">
        <label class="choice-label" for="remember-checkbox"><input id="remember-checkbox" name="remember" type="checkbox">Remember me</label>
      </div>
      <button id="login-submit" type="submit">Sign in</button>
      <p id="login-message" class="message" role="status" aria-live="polite" hidden></p>
    </form>
  </main>
  <footer><p>&copy; 2026 Automation Test Site</p></footer>
</body>
</html>
